	<div id="lightbox-modal" class="portfolio-lightbox">
		<img id="lightbox-img" src="" alt="Lightbox image">
		<button type="button" class="lightbox-close" aria-label="Close">×</button>
		<button type="button" class="lightbox-prev" aria-label="Previous">‹</button>
		<button type="button" class="lightbox-next" aria-label="Next">›</button>

	<script>
		(function() {
			var categoryGrid = document.getElementById('category-grid');
			var categoryGallery = document.getElementById('category-gallery');
			var galleryGrid = document.getElementById('gallery-grid');
			var galleryTitle = document.getElementById('gallery-title');
			var backBtn = document.getElementById('gallery-back');
			var modal = document.getElementById('lightbox-modal');
			var modalImg = document.getElementById('lightbox-img');
			var closeBtn = document.querySelector('.lightbox-close');
			var prevBtn = document.querySelector('.lightbox-prev');
			var nextBtn = document.querySelector('.lightbox-next');
			var currentIndex = 0;
			var visibleItems = [];
			var currentCategory = null;

			function toTitle(text) {
				return text.replace(/-/g, ' ').toUpperCase();
			}

			function collectVisibleItems() {
				visibleItems = [];
				var selector = currentCategory ? '.gallery-item[data-category="' + currentCategory + '"]' : '.gallery-item';
				var items = galleryGrid.querySelectorAll(selector);
				for (var i = 0; i < items.length; i++) {
					if (items[i].style.display === 'none') continue;
					visibleItems.push(items[i]);
				}
			}

			function getVisibleSrcs() {
				var srcs = [];
				for (var i = 0; i < visibleItems.length; i++) {
					var img = visibleItems[i].querySelector('img');
					if (img) srcs.push(img.src);
				}
				return srcs;
			}

			function updateModalImage() {
				if (!visibleItems.length || !modalImg) return;
				var img = visibleItems[currentIndex].querySelector('img');
				if (img) modalImg.src = img.src;
			}

			function openLightbox(index) {
				if (!modal || !modalImg) return;
				if (!visibleItems.length) collectVisibleItems();
				if (!visibleItems.length) return;
				currentIndex = Math.max(0, Math.min(index, visibleItems.length - 1));
				updateModalImage();
				modal.classList.add('active');
				document.body.style.overflow = 'hidden';
			}

			function closeLightbox() {
				if (!modal) return;
				modal.classList.remove('active');
				document.body.style.overflow = 'auto';
			}

			function showGallery(category) {
				currentCategory = category;
				var items = galleryGrid.querySelectorAll('.gallery-item');
				for (var i = 0; i < items.length; i++) {
					var itemCategory = items[i].getAttribute('data-category');
					items[i].style.display = (itemCategory === category) ? 'block' : 'none';
				}
				galleryTitle.textContent = toTitle(category);
				categoryGrid.style.display = 'none';
				categoryGallery.style.display = 'block';
				categoryGallery.setAttribute('aria-hidden', 'false');
				collectVisibleItems();
			}

			function showCategories() {
				currentCategory = null;
				categoryGrid.style.display = 'grid';
				categoryGallery.style.display = 'none';
				categoryGallery.setAttribute('aria-hidden', 'true');
				closeLightbox();
			}

			categoryGrid.addEventListener('click', function(e) {
				var card = e.target.closest('.portfolio-card');
				if (!card) return;
				e.preventDefault();
				var category = card.getAttribute('data-category');
				showGallery(category);
			});

			backBtn.addEventListener('click', function() {
				showCategories();
			});

			galleryGrid.addEventListener('click', function(e) {
				var item = e.target.closest('.gallery-item');
				if (!item) return;
				e.preventDefault();
				collectVisibleItems();
				var img = item.querySelector('img');
				if (!img) return;
				var index = visibleItems.indexOf(item);
				openLightbox(index < 0 ? 0 : index);
			});

			if (closeBtn) closeBtn.addEventListener('click', closeLightbox);
			if (modal) {
				modal.addEventListener('click', function(e) {
					if (e.target === modal) closeLightbox();
				});
			}
			if (prevBtn) {
				prevBtn.addEventListener('click', function() {
					if (!visibleItems.length) collectVisibleItems();
					if (!visibleItems.length) return;
					var srcs = getVisibleSrcs();
					var idx = srcs.indexOf(modalImg ? modalImg.src : '');
					if (idx < 0) idx = currentIndex;
					currentIndex = (idx - 1 + visibleItems.length) % visibleItems.length;
					updateModalImage();
				});
			}
			if (nextBtn) {
				nextBtn.addEventListener('click', function() {
					if (!visibleItems.length) collectVisibleItems();
					if (!visibleItems.length) return;
					var srcs = getVisibleSrcs();
					var idx = srcs.indexOf(modalImg ? modalImg.src : '');
					if (idx < 0) idx = currentIndex;
					currentIndex = (idx + 1) % visibleItems.length;
					updateModalImage();
				});
			}
			document.addEventListener('keydown', function(e) {
				if (!modal || !modal.classList.contains('active')) return;
				if (e.key === 'Escape') closeLightbox();
				if (e.key === 'ArrowLeft' && prevBtn) prevBtn.click();
				if (e.key === 'ArrowRight' && nextBtn) nextBtn.click();
			});

			showCategories();
		})();
	</script>
